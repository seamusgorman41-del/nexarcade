<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nexus Unblocked Games</title>
    <style>
      #root:empty {
        background: #0a0a0c;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #3b82f6;
        font-family: sans-serif;
        font-weight: bold;
      }
      #root:empty::after {
        content: "LOADING NEXUS...";
        letter-spacing: 0.2em;
        animation: pulse 1.5s infinite;
      }
      @keyframes pulse {
        0%, 100% { opacity: 0.4; }
        50% { opacity: 1; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./src/main.jsx"></script>
  </body>
</html>
